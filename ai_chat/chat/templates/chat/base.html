{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}CloudAI{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/chat.css' %}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; }
    .header { background: #232f3e; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 18px; font-weight: normal; }
    .header .meta { font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div class="header">
    <h1>{% block header %}CloudAI{% endblock %}</h1>
    <div style="display:flex; gap:16px; align-items:center;">
      <span class="meta">Django · Ollama · Cloud </span>
      {% if request.user.is_authenticated %}
        <span class="meta">{{ request.user.email }}</span>
        <a href="{% url 'logout' %}" style="color:white; text-decoration:none;">Logout</a>
      {% else %}
        <a href="{% url 'login' %}" style="color:white; text-decoration:none;">Login</a>
        <a href="{% url 'signup' %}" style="color:white; text-decoration:none;">Sign Up</a>
      {% endif %}
    </div>
  </div>
  {% block content %}{% endblock %}
</body>
</html>
