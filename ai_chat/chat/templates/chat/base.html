{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}Lab Chatbot{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/chat.css' %}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; }
    .header { background: #232f3e; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 18px; font-weight: normal; }
    .header .meta { font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div class="header">
    <h1>{% block header %}Lab Chatbot{% endblock %}</h1>
    <span class="meta">Django · PostgreSQL · AWS</span>
  </div>
  {% block content %}{% endblock %}
</body>
</html>
