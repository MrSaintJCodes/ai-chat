{% extends "chat/base.html" %}

{% block content %}
<div class="auth-card card fade-in">
  <h2>Welcome back</h2>
  <p style="color:var(--muted);">Sign in to access your private chat sessions.</p>

  <form method="POST" class="auth-form" data-show-loader="true">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="primary-btn">Login</button>
  </form>

  <p style="margin-top:16px;">
    No account?
    <a href="{% url 'signup' %}">Create one</a>
  </p>
</div>
{% endblock %}
