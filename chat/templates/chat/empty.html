{% extends "chat/base.html" %}

{% block content %}
<div style="display:flex; height:calc(100vh - 60px);">
  <div style="width:250px; border-right:1px solid #eee; padding:16px; background:#fafafa;">
    <a href="{% url 'new_chat' %}"
       style="display:inline-block; background:#ff9900; color:white; padding:10px 14px; border-radius:8px; text-decoration:none;">
      + New Chat
    </a>
  </div>

  <div style="flex:1; display:flex; align-items:center; justify-content:center; color:#888; font-size:18px;">
    No chats yet. Create a new chat to get started.
  </div>
</div>
{% endblock %}
